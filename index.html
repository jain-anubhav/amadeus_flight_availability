<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amadeus Flight Search Tool</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts (fixed: @ instead of = for weight values) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const PlaneIcon = () => (
            <svg className="w-4 h-4 mr-1 text-indigo-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
        );
        const CalendarIcon = () => (
            <svg className="w-4 h-4 mr-1 text-indigo-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
        );
        const UsersIcon = () => (
            <svg className="w-4 h-4 mr-1 text-indigo-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
        );
        const AirVentIcon = () => (
            <svg className="w-4 h-4 mr-1 text-indigo-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 12h8"></path>
                <path d="M12 8v8"></path>
            </svg>
        );
        const HashIcon = () => (
            <svg className="w-4 h-4 mr-1 text-indigo-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <line x1="4" y1="9" x2="20" y2="9"></line>
                <line x1="4" y1="15" x2="20" y2="15"></line>
                <line x1="10" y1="3" x2="8" y2="21"></line>
                <line x1="16" y1="3" x2="14" y2="21"></line>
            </svg>
        );
        const SearchIcon = () => (
            <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        );
        const LoaderIcon = () => (
            <svg className="w-8 h-8 animate-spin text-indigo-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" strokeDasharray="16" strokeDashoffset="14"></circle>
            </svg>
        );

        const AMADEUS_CLIENT_ID = 'JBifm02xS7GqjjyNghmzGzJE58odw5k3';
        const AMADEUS_CLIENT_SECRET = 'eLCFMh6mWXLWP33E';
        const API_URL_OFFERS = 'https://api.amadeus.com/v2/shopping/flight-offers';
        const API_URL_AVAILABILITY = 'https://api.amadeus.com/v1/shopping/availability/flight-availabilities';
        const TOKEN_URL = 'https://api.amadeus.com/v1/security/oauth2/token';

        const getTomorrowDate = () => {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            return tomorrow.toISOString().split('T')[0];
        };

        const getReturnDate20Days = (depDateStr) => {
            const depDate = new Date(depDateStr);
            depDate.setDate(depDate.getDate() + 20);
            return depDate.toISOString().split('T')[0];
        };

        const formatPrice = (price) => {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(price);
        };

        const formatDate = (isoString) => {
            const date = new Date(isoString);
            if (isNaN(date)) return 'N/A';
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        };

        const calculateDuration = (departureIso, arrivalIso) => {
            const departure = new Date(departureIso);
            const arrival = new Date(arrivalIso);
            if (isNaN(departure) || isNaN(arrival)) return 'N/A';
            const diffMs = arrival.getTime() - departure.getTime();
            if (diffMs < 0) return 'N/A';
            const hours = Math.floor(diffMs / (1000 * 60 * 60));
            const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            return `${hours}h ${minutes}m`;
        };

        const filterUniqueFlightsByMaxSeats = (flights) => {
            const flightMap = new Map();
            for (const flight of flights) {
                const flightId = `${flight.carrierCode}-${flight.flightNumber}`;
                const totalSeats = flight.availableSeats.reduce((sum, seat) => sum + seat.number, 0);
                if (flightId !== 'UNKWN-0000') {
                    if (!flightMap.has(flightId) || totalSeats > flightMap.get(flightId).totalSeats) {
                        flightMap.set(flightId, { flight, totalSeats });
                    }
                }
            }
            return Array.from(flightMap.values()).map(item => item.flight);
        };

        const Input = React.forwardRef(({ label, Icon, className = '', ...props }, ref) => (
            <div className="space-y-1">
                <label className="text-xs font-semibold text-gray-500 flex items-center">
                    {Icon && <Icon />}
                    {label}
                </label>
                <input
                    ref={ref}
                    {...props}
                    className={`w-full px-3 py-2 border border-gray-300 rounded-lg text-gray-900 focus:ring-indigo-500 focus:border-indigo-500 transition-shadow text-sm ${className}`}
                />
            </div>
        ));

        const App = () => {
            const [activeTab, setActiveTab] = useState('oneway_availability');
            const [origin, setOrigin] = useState('JFK');
            const [destination, setDestination] = useState('DEL');
            const [departureDate, setDepartureDate] = useState('2026-06-27');
            const [returnDate, setReturnDate] = useState(getReturnDate20Days('2026-06-27'));
            const [results, setResults] = useState([]);
            const [hasSearched, setHasSearched] = useState(false); // Fix: prevent "No Results" on initial load
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState('');

            const [adults, setAdults] = useState(1);
            const [carrierCode, setCarrierCode] = useState('');
            const [flightNumber, setFlightNumber] = useState('');

            const handleIATAChange = (e, setter) => {
                const input = e.target;
                let value = input.value;
                const selectionStart = input.selectionStart;
                setter(value.toUpperCase().trim());
                requestAnimationFrame(() => {
                    if (input) {
                        input.selectionStart = selectionStart;
                        input.selectionEnd = selectionStart;
                    }
                });
            };

            const fetchToken = useCallback(async () => {
                const authPayload = new URLSearchParams();
                authPayload.append('grant_type', 'client_credentials');
                authPayload.append('client_id', AMADEUS_CLIENT_ID);
                authPayload.append('client_secret', AMADEUS_CLIENT_SECRET);

                const tokenResponse = await fetch(TOKEN_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: authPayload.toString(),
                });

                if (tokenResponse.ok) {
                    const data = await tokenResponse.json();
                    return data.access_token;
                }
                throw new Error('Amadeus authentication token failed to generate.');
            }, []);

            const searchFlights = useCallback(async (e) => {
                if (e) e.preventDefault();
                setError('');
                setIsLoading(true);
                setResults([]);
                setHasSearched(true);

                try {
                    const token = await fetchToken();
                    const params = new URLSearchParams({
                        originLocationCode: origin,
                        destinationLocationCode: destination,
                        departureDate: departureDate,
                        adults: adults,
                        currencyCode: 'USD',
                        max: 20,
                        nonStop: true
                    });

                    const url = `${API_URL_OFFERS}?${params.toString()}`;
                    const response = await fetch(url, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const offers = data.data || [];
                        const dictionaries = data.dictionaries || {};

                        const formattedResults = offers.map(offer => {
                            const itinerary = offer.itineraries[0];
                            const segment = itinerary.segments[0];
                            const cCode = segment.carrierCode;
                            const cName = dictionaries.carriers ? dictionaries.carriers[cCode] : cCode;
                            return {
                                id: offer.id,
                                price: offer.price.grandTotal,
                                carrierName: cName,
                                carrierCode: cCode,
                                flightNumber: segment.number ? String(segment.number) : 'N/A',
                                duration: itinerary.duration,
                                departure: { iataCode: segment.departure.iataCode, at: segment.departure.at },
                                arrival: { iataCode: segment.arrival.iataCode, at: segment.arrival.at },
                                stops: itinerary.segments.length - 1,
                            };
                        });
                        setResults(formattedResults);
                    } else {
                        throw new Error('Failed to fetch flight offers.');
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            }, [origin, destination, departureDate, adults, fetchToken]);

            const searchAvailability = useCallback(async (e, isFiltered = false) => {
                if (e) e.preventDefault();
                setError('');
                setIsLoading(true);
                setResults([]);
                setHasSearched(true);

                try {
                    const token = await fetchToken();
                    const flightFilters = { "connectionRestriction": { "maxNumberOfConnections": 0 } };
                    if (carrierCode) flightFilters.carrierCode = [carrierCode];
                    if (flightNumber) flightFilters.flightNumber = flightNumber;

                    const requestBody = {
                        "originDestinations": [{
                            "id": "1",
                            "originLocationCode": origin,
                            "destinationLocationCode": destination,
                            "departureDateTime": { "date": departureDate }
                        }],
                        "travelers": [{ "id": "1", "travelerType": "ADULT" }],
                        "sources": ["GDS"],
                        "searchCriteria": { "flightFilters": flightFilters }
                    };

                    const response = await fetch(API_URL_AVAILABILITY, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(requestBody)
                    });

                    if (response.status === 400) {
                        const errorJson = await response.json();
                        const firstError = errorJson.errors?.[0] || {};
                        const errorCode = firstError.code;
                        const errorTitle = (firstError.title || "").toUpperCase();
                        const errorDetail = (firstError.detail || "").toUpperCase();

                        const isNoFlights = errorCode === 32111 ||
                                            errorTitle.includes("NO QUERY") ||
                                            errorTitle.includes("SEGMENT") ||
                                            errorDetail.includes("NO FLIGHT") ||
                                            errorDetail.includes("NO PLAY");

                        if (isNoFlights) {
                            setResults([]);
                            setIsLoading(false);
                            return;
                        }
                    }

                    if (response.ok) {
                        const data = await response.json();
                        const offers = data.data || [];
                        const formattedResults = offers.map(offer => {
                            const segment = offer.segments?.[0];
                            const rawAvailableSeats = segment?.availabilityClasses || [];
                            const availableSeats = rawAvailableSeats.map(seat => ({
                                class: seat.class,
                                number: seat.numberOfBookableSeats,
                            }));
                            return {
                                carrierCode: segment?.carrierCode,
                                flightNumber: segment?.number,
                                departure: segment?.departure,
                                arrival: segment?.arrival,
                                availableSeats,
                            };
                        });

                        const finalResults = isFiltered ? filterUniqueFlightsByMaxSeats(formattedResults) : formattedResults;
                        setResults(finalResults);
                    } else {
                        const errorJson = await response.json();
                        const detail = errorJson.errors?.[0]?.detail || response.statusText;
                        throw new Error(`Amadeus rejected search: ${detail}`);
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsLoading(false);
                }
            }, [origin, destination, departureDate, carrierCode, flightNumber, fetchToken]);

            return (
                <div className="min-h-screen bg-gray-50 p-4 md:p-8 flex justify-center">
                    <div className="w-full max-w-lg">
                        <header className="py-4 mb-6">
                            <h1 className="text-3xl font-extrabold text-gray-900 text-center tracking-tight">Amadeus Flight Tools</h1>
                            <p className="text-sm text-gray-500 text-center mt-1">
                                {activeTab === 'offers' ? 'Search for best flight offers.' : 'Check specific flight seat availability.'}
                            </p>
                        </header>

                        <div className="flex justify-around bg-white p-2 rounded-2xl shadow-xl mb-6 border border-gray-200">
                            <button onClick={() => { setActiveTab('offers'); setResults([]); setError(''); setHasSearched(false); }} className={`flex-1 flex items-center justify-center py-2.5 px-3 rounded-xl transition-all duration-200 ${activeTab === 'offers' ? 'bg-indigo-600 text-white font-semibold shadow' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                                <SearchIcon /><span className="text-xs sm:text-sm ml-1">Offers</span>
                            </button>
                            <button onClick={() => { setActiveTab('oneway_availability'); setResults([]); setError(''); setHasSearched(false); }} className={`flex-1 flex items-center justify-center py-2.5 px-3 rounded-xl transition-all duration-200 ${activeTab === 'oneway_availability' ? 'bg-indigo-600 text-white font-semibold shadow' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                                <AirVentIcon /><span className="text-xs sm:text-sm ml-1">Avail (1-way)</span>
                            </button>
                            <button onClick={() => { setActiveTab('roundtrip_availability'); setResults([]); setError(''); setHasSearched(false); }} className={`flex-1 flex items-center justify-center py-2.5 px-3 rounded-xl transition-all duration-200 ${activeTab === 'roundtrip_availability' ? 'bg-indigo-600 text-white font-semibold shadow' : 'bg-gray-100 text-gray-700 hover:bg-gray-200'}`}>
                                <CalendarIcon /><span className="text-xs sm:text-sm ml-1">Avail (R/T)</span>
                            </button>
                        </div>

                        <div className="bg-white p-5 rounded-3xl shadow-2xl mb-8 border border-gray-100">
                            <form onSubmit={(e) => activeTab === 'offers' ? searchFlights(e) : searchAvailability(e, activeTab === 'roundtrip_availability')} className="space-y-4">
                                <div className="grid grid-cols-2 gap-3">
                                    <Input label="Origin (IATA)" Icon={PlaneIcon} value={origin} onChange={(e) => handleIATAChange(e, setOrigin)} maxLength={3} placeholder="JFK" required className="uppercase" />
                                    <Input label="Destination (IATA)" Icon={PlaneIcon} value={destination} onChange={(e) => handleIATAChange(e, setDestination)} maxLength={3} placeholder="DEL" required className="uppercase" />
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <Input label={activeTab === 'roundtrip_availability' ? "Outbound Date" : "Departure Date"} Icon={CalendarIcon} value={departureDate} onChange={(e) => { setDepartureDate(e.target.value); setReturnDate(getReturnDate20Days(e.target.value)); }} type="date" required />
                                    {activeTab === 'roundtrip_availability' ? (
                                        <div className="space-y-1">
                                            <label className="text-xs font-semibold text-gray-500 flex items-center"><CalendarIcon /><span className="ml-1">Return Date (+20d)</span></label>
                                            <div className="w-full px-3 py-2 bg-gray-100 border border-gray-300 rounded-lg text-gray-600 text-sm select-none font-medium h-9 flex items-center">{formatDate(returnDate)}</div>
                                        </div>
                                    ) : activeTab === 'offers' ? (
                                        <Input label="Adults" Icon={UsersIcon} value={adults} onChange={(e) => setAdults(e.target.value)} type="number" min="1" required />
                                    ) : (
                                        <Input label="Carrier Code (Opt)" Icon={AirVentIcon} value={carrierCode} onChange={(e) => handleIATAChange(e, setCarrierCode)} maxLength={2} placeholder="AI" className="uppercase" />
                                    )}
                                </div>

                                {activeTab !== 'offers' && activeTab !== 'roundtrip_availability' && (
                                    <Input label="Flight Number (Opt)" Icon={HashIcon} value={flightNumber} onChange={(e) => setFlightNumber(e.target.value)} maxLength={4} placeholder="102" />
                                )}

                                <button type="submit" disabled={isLoading} className="w-full flex items-center justify-center px-4 py-3 text-lg font-bold rounded-xl bg-indigo-600 text-white hover:bg-indigo-700 disabled:bg-indigo-300 shadow-lg transition-all duration-150">
                                    {isLoading ? 'Searching...' : activeTab === 'offers' ? 'Find Flight Offers' : activeTab === 'roundtrip_availability' ? 'Check R/T Availability' : 'Check 1-Way Availability'}
                                </button>
                            </form>
                        </div>

                        {hasSearched && (
                            <h2 className="text-2xl font-bold text-gray-800 mb-4 px-1">
                                {isLoading ? 'Results' : `${results.length} Results Found`}
                            </h2>
                        )}

                        {error && (
                            <div className="p-4 bg-red-50 border border-red-300 text-red-700 rounded-xl mb-4 text-center">
                                <h3 className="font-bold">Search Error</h3>
                                <p className="text-sm mt-1 font-medium">{error}</p>
                            </div>
                        )}

                        {isLoading && (
                            <div className="flex flex-col items-center justify-center p-8 bg-white rounded-xl shadow border border-gray-100">
                                <LoaderIcon />
                                <p className="mt-4 text-gray-600 font-semibold">Querying Amadeus GDS...</p>
                            </div>
                        )}

                        {/* Fix: only show "No Results" after a search has been performed */}
                        {hasSearched && !isLoading && !error && results.length === 0 && (
                            <div className="p-6 bg-yellow-50 border border-yellow-300 text-yellow-700 rounded-xl text-center">
                                <h3 className="font-bold text-lg">No Results Found</h3>
                                <p className="text-sm mt-1 font-medium">There are no matching flights on this date. Nonstop seats may be fully booked or unavailable. If searching, try changing JFK to DEL.</p>
                            </div>
                        )}

                        {!isLoading && !error && results.length > 0 && (
                            <div className="space-y-4">
                                {results.map((flight, idx) => (
                                    activeTab === 'offers' ? (
                                        <div key={flight.id} className="bg-white p-4 rounded-xl shadow border border-gray-100">
                                            <div className="flex justify-between border-b pb-2 mb-2">
                                                <span className="text-xl font-extrabold text-indigo-700">{formatPrice(flight.price)}</span>
                                                <span className="text-sm font-bold text-gray-800">{flight.carrierCode} {flight.flightNumber}</span>
                                            </div>
                                            <div className="grid grid-cols-5 items-center text-center">
                                                <div className="col-span-2"><span className="text-lg font-bold block">{new Date(flight.departure.at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span><span className="text-xs text-gray-500 font-medium">{flight.departure.iataCode}</span></div>
                                                <div className="col-span-1 text-xs text-indigo-600 font-bold">Direct</div>
                                                <div className="col-span-2"><span className="text-lg font-bold block">{new Date(flight.arrival.at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span><span className="text-xs text-gray-500 font-medium">{flight.arrival.iataCode}</span></div>
                                            </div>
                                        </div>
                                    ) : (
                                        <div key={idx} className="bg-white p-4 rounded-xl shadow-lg border border-indigo-100 hover:shadow-xl transition-shadow duration-200">
                                            <div className="flex justify-between border-b pb-2 mb-2">
                                                <span className="text-xl font-extrabold text-indigo-700">{flight.carrierCode || 'UA'} {flight.flightNumber || '100'}</span>
                                                <span className="text-xs font-bold text-indigo-600 tracking-wider">INVENTORY COUNTS</span>
                                            </div>
                                            <div className="grid grid-cols-5 items-center text-center my-3">
                                                <div className="col-span-2 text-left"><span className="text-lg font-extrabold block text-gray-800">{new Date(flight.departure.at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span><span className="text-xs text-gray-500 font-medium">{formatDate(flight.departure.at)} · {flight.departure.iataCode}</span></div>
                                                <div className="col-span-1 text-xs text-indigo-600 font-extrabold tracking-tight">{calculateDuration(flight.departure.at, flight.arrival.at)}</div>
                                                <div className="col-span-2 text-right"><span className="text-lg font-extrabold block text-gray-800">{new Date(flight.arrival.at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span><span className="text-xs text-gray-500 font-medium">{formatDate(flight.arrival.at)} · {flight.arrival.iataCode}</span></div>
                                            </div>
                                            <div className="p-3 bg-gray-100 rounded-lg text-sm font-mono text-gray-800 text-center break-words shadow-inner">
                                                <span className="font-extrabold text-indigo-600 mr-2">Classes:</span>
                                                {flight.availableSeats.length > 0 ? flight.availableSeats.map(s => `${s.class}:${s.number}`).join(', ') : 'None'}
                                            </div>
                                        </div>
                                    )
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
